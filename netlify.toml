[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."wc"]
  timeout = 30

[functions."auth"]
  timeout = 10

[functions."data"]
  timeout = 15

[functions."update-results"]
  schedule = "*/15 * * * *"
  timeout = 30
